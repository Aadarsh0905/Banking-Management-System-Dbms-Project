# ============================================================
# Test Profile — uses H2 in-memory DB
# ============================================================
spring.datasource.url=jdbc:h2:mem:banking_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

jwt.secret=TestSecretKeyForUnitTestsOnly32CharsMinimum!!
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

spring.mail.host=localhost
spring.mail.port=25

logging.level.com.banking=WARN
logging.level.org.springframework.security=WARN
