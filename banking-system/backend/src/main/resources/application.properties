# ============================================================
# Banking Management System — Application Configuration
# ============================================================

spring.application.name=banking-management-system
server.port=${PORT:8080}
server.servlet.context-path=/api

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:banking_db}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:MySuperSecretKeyForBankingSystem2024ForJWTTokenGeneration}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ── Mail ──────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:noreply@bank.com}
spring.mail.password=${MAIL_PASS:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
banking.mail.from=noreply@bank.com
banking.mail.from-name=Banking Management System

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.banking.controller

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
banking.upload.dir=${UPLOAD_DIR:./uploads}

# ── Security ──────────────────────────────────────────────
banking.security.max-login-attempts=5
banking.security.lockout-duration-minutes=30
banking.security.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging ───────────────────────────────────────────────
logging.level.com.banking=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
