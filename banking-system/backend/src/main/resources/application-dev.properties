# ============================================================
# Development Profile — overrides application.properties
# Activate with: --spring.profiles.active=dev
# ============================================================

# Show SQL queries in dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Allow DDL auto create for dev (change to validate/none in prod)
spring.jpa.hibernate.ddl-auto=update

# Disable security for actuator in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Verbose logging in dev
logging.level.com.banking=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Mail — use Mailtrap for dev (https://mailtrap.io)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_user
spring.mail.password=your_mailtrap_pass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
