# ============================================================
# Production Profile — overrides application.properties
# ============================================================

# Never auto-create/alter schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Restrict actuator endpoints in prod
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Production logging — INFO only
logging.level.com.banking=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Larger connection pool for production
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
